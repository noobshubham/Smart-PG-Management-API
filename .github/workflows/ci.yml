name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install ruff==0.7.4
      - run: ruff check --output-format=github .

  test:
    name: pytest (py3.13)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///:memory:"
      JWT_SECRET_KEY: "ci-test-secret-key-not-for-prod"
      WHATSAPP_VERIFY_TOKEN: "ci-verify"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest -vv

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build --tag smart-pg:ci .
